<!DOCTYPE html>

<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Dashboard Admin - SiRapor PAUD</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">

<style>

body{
    background:#f4f6f9;
    font-family:Arial, sans-serif;
}

.sidebar{
    background:#198754;
    min-height:100vh;
}

.sidebar a{
    display:block;
    color:white;
    text-decoration:none;
    padding:12px 15px;
    border-radius:8px;
    margin-bottom:5px;
}

.sidebar a:hover{
    background:rgba(255,255,255,.15);
}

.logo{
    width:90px;
}

.card-dashboard{
    border:none;
    border-radius:15px;
}

.card-dashboard .card-body{
    text-align:center;
}

.number{
    font-size:32px;
    font-weight:bold;
}

</style>

</head>

<body>

<script>

const user =
JSON.parse(
    localStorage.getItem("user")
);

if(!user){

    window.location.href =
        "index.html";

}

</script>

<div class="container-fluid">

<div class="row">

<!-- SIDEBAR -->

<div class="col-md-2 sidebar text-white p-3">

<div class="text-center">

    <img
        src="assets/img/logo.png"
        class="logo"
        alt="Logo">

    <h5 class="mt-3">
        SiRapor PAUD
    </h5>

    <small>
        PAUD DAHLIA XIII
    </small>

</div>

<hr>

<a href="dashboard.html">
    <i class="fa fa-home"></i>
    Dashboard
</a>

<a href="pages/guru.html">
    <i class="fa fa-user"></i>
    Data Guru
</a>

<a href="#">
    <i class="fa fa-users"></i>
    Data Siswa
</a>

<a href="#">
    <i class="fa fa-school"></i>
    Data Kelas
</a>

<a href="#">
    <i class="fa fa-book"></i>
    Nilai
</a>

<a href="#">
    <i class="fa fa-file-pdf"></i>
    Rapor
</a>

<a href="#" onclick="logout()">
    <i class="fa fa-sign-out-alt"></i>
    Logout
</a>


</div>

<!-- CONTENT -->

<div class="col-md-10 p-4">


<div class="mb-4">

    <h2>
        Dashboard Admin
    </h2>

    <div class="alert alert-success">

        Selamat datang,

        <strong id="namaUser"></strong>

    </div>

</div>

<div class="row">

    <div class="col-md-3 mb-3">

        <div class="card card-dashboard shadow">

            <div class="card-body">

                <i class="fa fa-user fa-2x text-success"></i>

                <h6 class="mt-2">
                    Total Guru
                </h6>

                <div
                    id="totalGuru"
                    class="number">

                    0

                </div>

            </div>

        </div>

    </div>

    <div class="col-md-3 mb-3">

        <div class="card card-dashboard shadow">

            <div class="card-body">

                <i class="fa fa-users fa-2x text-primary"></i>

                <h6 class="mt-2">
                    Total Siswa
                </h6>

                <div
                    id="totalSiswa"
                    class="number">

                    0

                </div>

            </div>

        </div>

    </div>

    <div class="col-md-3 mb-3">

        <div class="card card-dashboard shadow">

            <div class="card-body">

                <i class="fa fa-school fa-2x text-warning"></i>

                <h6 class="mt-2">
                    Total Kelas
                </h6>

                <div
                    id="totalKelas"
                    class="number">

                    0

                </div>

            </div>

        </div>

    </div>

    <div class="col-md-3 mb-3">

        <div class="card card-dashboard shadow">

            <div class="card-body">

                <i class="fa fa-file-pdf fa-2x text-danger"></i>

                <h6 class="mt-2">
                    Total Rapor
                </h6>

                <div
                    id="totalRapor"
                    class="number">

                    0

                </div>

            </div>

        </div>

    </div>

</div>

<div class="card shadow">

    <div class="card-body">

        <h5>
            Informasi Sistem
        </h5>

        <p>
            Sistem Informasi Rapor Digital
            PAUD DAHLIA XIII.
        </p>

        <p>
            Versi : 1.0.0
        </p>

    </div>

</div>

</div>

</div>

</div>

<script>

document.getElementById(
    "namaUser"
).innerText =
    user.nama || "Administrator";

function logout(){

    localStorage.clear();

    window.location.href =
        "index.html";

}

</script>

<script src="assets/js/config.js"></script>

<script>

async function loadDashboard(){

    try{

        const response =
            await fetch(
                CONFIG.API_URL +
                "?action=getDashboard"
            );

        const result =
            await response.json();

        if(result.status){

            document.getElementById(
                "totalGuru"
            ).innerText =
                result.totalGuru;

            document.getElementById(
                "totalSiswa"
            ).innerText =
                result.totalSiswa;

            document.getElementById(
                "totalKelas"
            ).innerText =
                result.totalKelas;

            document.getElementById(
                "totalRapor"
            ).innerText =
                result.totalRapor;

        }

    }catch(error){

        console.log(error);

    }

}

loadDashboard();

</script>

</body>
</html>
