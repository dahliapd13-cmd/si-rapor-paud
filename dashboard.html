<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Dashboard Admin</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">

<style>

body{
    background:#f5f7fa;
}

.sidebar{
    min-height:100vh;
    background:#198754;
}

.sidebar a{
    color:white;
    text-decoration:none;
    display:block;
    padding:12px;
}

.sidebar a:hover{
    background:rgba(255,255,255,.1);
}

.card{
    border:none;
    border-radius:15px;
}

</style>

</head>

<body>

<div class="container-fluid">

<div class="row">

<div class="col-md-2 sidebar">

<div class="text-center py-4">

<img
src="assets/img/logo.png"
width="80">

<h5 class="text-white mt-2">
SiRapor PAUD
</h5>

</div>

<a href="dashboard.html">
<i class="fa fa-home"></i>
Dashboard
</a>

<a href="pages/guru.html">
<i class="fa fa-user"></i>
Guru
</a>

<a href="pages/siswa.html">
<i class="fa fa-users"></i>
Siswa
</a>

<a href="pages/kelas.html">
<i class="fa fa-school"></i>
Kelas
</a>

<a href="pages/nilai.html">
<i class="fa fa-book"></i>
Nilai
</a>

<a href="pages/rapor.html">
<i class="fa fa-file-pdf"></i>
Rapor
</a>

<a href="#" onclick="logout()">
<i class="fa fa-sign-out-alt"></i>
Logout
</a>

</div>

<div class="col-md-10 p-4">

<h2>
Dashboard Admin
</h2>

<p id="welcome"></p>

<div class="row">

<div class="col-md-3">

<div class="card shadow-sm">

<div class="card-body">

<h6>Total Guru</h6>

<h2 id="totalGuru">
0
</h2>

</div>

</div>

</div>

<div class="col-md-3">

<div class="card shadow-sm">

<div class="card-body">

<h6>Total Siswa</h6>

<h2 id="totalSiswa">
0
</h2>

</div>

</div>

</div>

<div class="col-md-3">

<div class="card shadow-sm">

<div class="card-body">

<h6>Total Kelas</h6>

<h2 id="totalKelas">
0
</h2>

</div>

</div>

</div>

<div class="col-md-3">

<div class="card shadow-sm">

<div class="card-body">

<h6>Total Rapor</h6>

<h2 id="totalRapor">
0
</h2>

</div>

</div>

</div>

</div>

</div>

</div>

</div>

<script>

const user =
JSON.parse(
localStorage.getItem("user")
);

if(!user){

 location.href="index.html";

}

document
.getElementById("welcome")
.innerHTML=
"Selamat datang <b>"
+ user.nama +
"</b>";

function logout(){

 localStorage.clear();

 location.href="index.html";

}

</script>

</body>
</html>
