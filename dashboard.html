<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Dashboard Admin - SiRapor PAUD</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#f5f7fa;
}

.sidebar{
    background:#198754;
    min-height:100vh;
}

.sidebar a{
    display:block;
    color:white;
    text-decoration:none;
    padding:12px;
}

.sidebar a:hover{
    background:rgba(255,255,255,.15);
}

.card{
    border:none;
    border-radius:15px;
}
</style>

</head>
<body>

<script>
const user = JSON.parse(localStorage.getItem("user"));

if(!user){
    window.location.href = "index.html";
}
</script>

<div class="container-fluid">

<div class="row">

<div class="col-md-2 sidebar text-white">

    <div class="text-center py-4">

        <img
            src="assets/img/logo.png"
            width="80"
            alt="Logo">

        <h5 class="mt-3">
            SiRapor PAUD
        </h5>

    </div>

    <a href="#">Dashboard</a>
    <a href="#">Data Guru</a>
    <a href="#">Data Siswa</a>
    <a href="#">Data Kelas</a>
    <a href="#">Nilai</a>
    <a href="#">Rapor</a>

    <a href="#" onclick="logout()">
        Logout
    </a>

</div>

<div class="col-md-10 p-4">

    <h2>Dashboard Admin</h2>

    <div class="alert alert-success">
        Selamat datang
        <strong id="namaUser"></strong>
    </div>

    <div class="row">

        <div class="col-md-3 mb-3">
            <div class="card shadow">
                <div class="card-body">
                    <h6>Total Guru</h6>
                    <h2>0</h2>
                </div>
            </div>
        </div>

        <div class="col-md-3 mb-3">
            <div class="card shadow">
                <div class="card-body">
                    <h6>Total Siswa</h6>
                    <h2>0</h2>
                </div>
            </div>
        </div>

        <div class="col-md-3 mb-3">
            <div class="card shadow">
                <div class="card-body">
                    <h6>Total Kelas</h6>
                    <h2>0</h2>
                </div>
            </div>
        </div>

        <div class="col-md-3 mb-3">
            <div class="card shadow">
                <div class="card-body">
                    <h6>Total Rapor</h6>
                    <h2>0</h2>
                </div>
            </div>
        </div>

    </div>

</div>

</div>

</div>

<script>

document.getElementById("namaUser").innerText =
    user.nama || "Administrator";

function logout(){

    localStorage.removeItem("user");

    window.location.href = "index.html";

}

</script>

</body>
</html>
